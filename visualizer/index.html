<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-MIDI Visualizer</title>
  <style>
    :root {
      --bg: #07111d;
      --panel: #0f1e33;
      --line: #1f3454;
      --text: #dce8ff;
      --muted: #8aa3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 126, 185, 0.16), transparent 26%),
        radial-gradient(circle at top right, rgba(80, 176, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #08101c 0%, #04070d 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell {
      width: min(920px, 100%);
      background: rgba(15, 30, 51, 0.82);
      border: 1px solid rgba(138, 163, 199, 0.18);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status {
      padding: 8px 12px;
      border: 1px solid rgba(138, 163, 199, 0.18);
      border-radius: 999px;
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(7, 17, 29, 0.75);
    }
    select {
      background: #09111d;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 140px;
    }
    canvas {
      width: 600px;
      height: 600px;
      max-width: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(138, 163, 199, 0.18);
      background: rgba(4, 10, 18, 0.92);
      margin: 0 auto;
    }
    .legend {
      margin-top: 16px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1>E-MIDI Emotional Grid</h1>
        <div class="sub">valence = X, arousal = Y, tension = hue</div>
      </div>
      <div class="controls">
        <label>
          <span style="display:block; margin-bottom:6px; color: var(--muted); font-size:0.82rem;">Source</span>
          <select id="sourceFilter">
            <option value="all">全員</option>
          </select>
        </label>
        <div class="status" id="statusIndicator">🔴 disconnected</div>
      </div>
    </div>
    <canvas id="grid" width="600" height="600"></canvas>
    <div class="legend">
      <div>Blue: low tension / Green: mid tension / Red: high tension</div>
      <div>Flash: bounce detected</div>
    </div>
  </div>

  <script src="/visualizer/grid.js"></script>
  <script src="/visualizer/client.js"></script>
</body>
</html>
